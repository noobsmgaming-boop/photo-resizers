<!DOCTYPE html>
<html>
<head>
<title>Photo Resizer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:Arial,sans-serif;
background:#111;
color:white;
text-align:center;
padding:20px;
}
.container{
max-width:600px;
margin:auto;
background:#222;
padding:20px;
border-radius:15px;
}
input,select,button{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}
button{
background:#00c853;
color:white;
font-size:18px;
cursor:pointer;
}
canvas{
max-width:100%;
margin-top:20px;
background:white;
}
</style>
</head>
<body>

<div class="container">
<h1>📷 Photo Resizers</h1>

<input type="file" id="upload">

<select id="size">
<option value="300,300">SSC GD Photo</option>
<option value="200,230">Railway Photo</option>
<option value="140,60">Signature</option>
<option value="300,100">Thumb Impression</option>
<option value="413,531">Passport Photo</option>
</select>

<button onclick="resizeImage()">Resize Photo</button>

<canvas id="canvas"></canvas>

<a id="download" download="photo.png">
<button>⬇ Download</button>
</a>
</div>

<script>
function resizeImage(){
const file=document.getElementById('upload').files[0];
if(!file) return alert("Photo Upload Karo");

const img=new Image();
img.onload=function(){
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

const size=document.getElementById('size').value.split(',');
canvas.width=size[0];
canvas.height=size[1];

ctx.drawImage(img,0,0,size[0],size[1]);

document.getElementById('download').href=
canvas.toDataURL();
}
img.src=URL.createObjectURL(file);
}
</script>

</body>
</html>
